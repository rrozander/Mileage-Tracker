name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    # PM2 requires HOME; self-hosted runners often omit it.
    env:
      HOME: /root

    defaults:
      run:
        working-directory: /root/Mileage-Tracker

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Restart application
        run: pm2 restart mileage-tracker
